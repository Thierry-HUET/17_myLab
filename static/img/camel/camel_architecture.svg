<svg width="100%" viewBox="0 0 680 220" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Architecture des conteneurs docker-compose</title>
<desc>Trois conteneurs MS-SQL, Camel/Karavan et PostgreSQL relies par JDBC dans un docker-compose.</desc>
<defs>
  <style>
    .bbl{fill:#E6F1FB;stroke:#185FA5;stroke-width:0.5}
    .btl{fill:#E1F5EE;stroke:#0F6E56;stroke-width:0.5}
    .bpl{fill:#EEEDFE;stroke:#534AB7;stroke-width:0.5}
    .tbl{fill:#0C447C;font-family:sans-serif;font-size:14px;font-weight:500}
    .sbl{fill:#185FA5;font-family:sans-serif;font-size:11px}
    .ttl{fill:#085041;font-family:sans-serif;font-size:14px;font-weight:500}
    .stl{fill:#0F6E56;font-family:sans-serif;font-size:11px}
    .tpl{fill:#3C3489;font-family:sans-serif;font-size:14px;font-weight:500}
    .spl{fill:#534AB7;font-family:sans-serif;font-size:11px}
    .lbl{fill:#888780;font-family:sans-serif;font-size:11px}
    .ln{stroke:#B4B2A9;stroke-width:0.5;fill:none}
  </style>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#B4B2A9" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>
<rect x="20" y="20" width="640" height="150" rx="14" fill="#F1EFE8" fill-opacity="0.2" stroke="#5F5E5A" stroke-width="0.5" stroke-dasharray="6 3"/>
<text class="lbl" x="36" y="40" dominant-baseline="central">docker-compose</text>
<rect x="50" y="62" width="160" height="76" rx="10" class="bpl"/>
<text class="tpl" x="130" y="90" text-anchor="middle" dominant-baseline="central">MS-SQL</text>
<text class="spl" x="130" y="108" text-anchor="middle" dominant-baseline="central">port 1433</text>
<text class="spl" x="130" y="124" text-anchor="middle" dominant-baseline="central">sourcedb</text>
<rect x="260" y="62" width="160" height="76" rx="10" class="bbl"/>
<text class="tbl" x="340" y="90" text-anchor="middle" dominant-baseline="central">Camel / Karavan</text>
<text class="sbl" x="340" y="108" text-anchor="middle" dominant-baseline="central">port 8080</text>
<text class="sbl" x="340" y="124" text-anchor="middle" dominant-baseline="central">routes YAML</text>
<rect x="470" y="62" width="160" height="76" rx="10" class="btl"/>
<text class="ttl" x="550" y="90" text-anchor="middle" dominant-baseline="central">PostgreSQL</text>
<text class="stl" x="550" y="108" text-anchor="middle" dominant-baseline="central">port 5432</text>
<text class="stl" x="550" y="124" text-anchor="middle" dominant-baseline="central">targetdb</text>
<line x1="212" y1="100" x2="258" y2="100" class="ln" marker-end="url(#arr)"/>
<text class="lbl" x="235" y="90" text-anchor="middle">JDBC SELECT</text>
<line x1="422" y1="100" x2="468" y2="100" class="ln" marker-end="url(#arr)"/>
<text class="lbl" x="445" y="90" text-anchor="middle">JDBC INSERT</text>
<text class="lbl" x="340" y="185" text-anchor="middle">Karavan attend MS-SQL et PostgreSQL via depends_on</text>
</svg>
