<svg width="100%" viewBox="0 0 680 400" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Arbre de décision — choix du framework d'intégration</title>
<desc>Arbre guidant vers Apache Camel, des solutions no-code ou des ESB commerciaux.</desc>
<defs>
  <style>
    .bbl{fill:#E6F1FB;stroke:#185FA5}.bpl{fill:#EEEDFE;stroke:#534AB7}.bcl{fill:#FAECE7;stroke:#993C1D}.bgl{fill:#F1EFE8;stroke:#5F5E5A}
    .tbl{fill:#0C447C;font-family:sans-serif;font-size:14px;font-weight:500}.sbl{fill:#185FA5;font-family:sans-serif;font-size:12px}
    .tpl{fill:#3C3489;font-family:sans-serif;font-size:14px;font-weight:500}.spl{fill:#534AB7;font-family:sans-serif;font-size:12px}
    .tcl{fill:#712B13;font-family:sans-serif;font-size:14px;font-weight:500}.scl{fill:#993C1D;font-family:sans-serif;font-size:12px}
    .tgl{fill:#444441;font-family:sans-serif;font-size:14px;font-weight:500}.sgl{fill:#5F5E5A;font-family:sans-serif;font-size:12px}
    .ln{stroke:#888780;stroke-width:0.5;fill:none}.lbl{font-family:sans-serif;font-size:11px;fill:#888780}
  </style>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>
<rect x="240" y="20" width="200" height="44" rx="8" class="bgl" stroke-width="0.5"/>
<text class="tgl" x="340" y="38" text-anchor="middle" dominant-baseline="central">Besoin d'intégration</text>
<text class="sgl" x="340" y="55" text-anchor="middle" dominant-baseline="central">Quel profil d'équipe ?</text>
<line x1="340" y1="64" x2="340" y2="100" class="ln" marker-end="url(#arr)"/>
<rect x="220" y="100" width="240" height="44" rx="8" class="bpl" stroke-width="0.5"/>
<text class="tpl" x="340" y="118" text-anchor="middle" dominant-baseline="central">Équipe dev disponible ?</text>
<text class="spl" x="340" y="135" text-anchor="middle" dominant-baseline="central">Java · YAML · scripts</text>
<path d="M220 122 L150 122 L150 210" class="ln" marker-end="url(#arr)"/>
<text class="lbl" x="140" y="165" text-anchor="middle">Non</text>
<rect x="50" y="210" width="200" height="44" rx="8" class="bcl" stroke-width="0.5"/>
<text class="tcl" x="150" y="228" text-anchor="middle" dominant-baseline="central">iPaaS no-code</text>
<text class="scl" x="150" y="245" text-anchor="middle" dominant-baseline="central">Make · Zapier · Boomi</text>
<path d="M460 122 L530 122 L530 190" class="ln" marker-end="url(#arr)"/>
<text class="lbl" x="540" y="155">Oui</text>
<rect x="410" y="190" width="240" height="44" rx="8" class="bpl" stroke-width="0.5"/>
<text class="tpl" x="530" y="208" text-anchor="middle" dominant-baseline="central">Budget licence ?</text>
<text class="spl" x="530" y="225" text-anchor="middle" dominant-baseline="central">Coût plateforme accepté</text>
<path d="M530 234 L530 270 L420 270 L420 300" class="ln" marker-end="url(#arr)"/>
<text class="lbl" x="470" y="262" text-anchor="middle">Gratuit</text>
<rect x="310" y="300" width="220" height="56" rx="8" class="bbl" stroke-width="1"/>
<text class="tbl" x="420" y="322" text-anchor="middle" dominant-baseline="central">Apache Camel</text>
<text class="sbl" x="420" y="341" text-anchor="middle" dominant-baseline="central">Spring Integration</text>
<path d="M650 212 L650 310" class="ln" marker-end="url(#arr)"/>
<text class="lbl" x="655" y="260">Budget dispo</text>
<rect x="570" y="310" width="100" height="60" rx="8" class="bgl" stroke-width="0.5"/>
<text class="tgl" x="620" y="332" text-anchor="middle" dominant-baseline="central">ESB</text>
<text class="sgl" x="620" y="349" text-anchor="middle" dominant-baseline="central">MuleSoft</text>
<text class="sgl" x="620" y="363" text-anchor="middle" dominant-baseline="central">WSO2 · TIBCO</text>
</svg>
