<svg width="100%" viewBox="0 0 680 280" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Perimetre Apache Camel</title>
<desc>Domaines couverts par Apache Camel.</desc>
<defs>
  <style>
    .bbl{fill:#E6F1FB;stroke:#185FA5;stroke-width:0.5}.btl{fill:#E1F5EE;stroke:#0F6E56;stroke-width:0.5}.bpl{fill:#EEEDFE;stroke:#534AB7;stroke-width:0.5}.bgl{fill:#F1EFE8;stroke:#5F5E5A;stroke-width:0.5}
    .tbl{fill:#0C447C;font-family:sans-serif;font-size:14px;font-weight:500}.sbl{fill:#185FA5;font-family:sans-serif;font-size:11px}
    .ttl{fill:#085041;font-family:sans-serif;font-size:14px;font-weight:500}.stl{fill:#0F6E56;font-family:sans-serif;font-size:11px}
    .tpl{fill:#3C3489;font-family:sans-serif;font-size:14px;font-weight:500}.spl{fill:#534AB7;font-family:sans-serif;font-size:11px}
    .tgl{fill:#444441;font-family:sans-serif;font-size:14px;font-weight:500}.sgl{fill:#5F5E5A;font-family:sans-serif;font-size:11px}
    .ln{stroke:#B4B2A9;stroke-width:0.5;fill:none}
  </style>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#B4B2A9" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>
<rect x="240" y="110" width="200" height="56" rx="10" class="bbl"/>
<text class="tbl" x="340" y="132" text-anchor="middle" dominant-baseline="central">Apache Camel</text>
<text class="sbl" x="340" y="151" text-anchor="middle" dominant-baseline="central">framework d integration</text>
<rect x="20" y="22" width="190" height="52" rx="8" class="btl"/>
<text class="ttl" x="115" y="42" text-anchor="middle" dominant-baseline="central">Routing</text>
<text class="stl" x="115" y="60" text-anchor="middle" dominant-baseline="central">Aiguillage des messages</text>
<line x1="210" y1="54" x2="238" y2="120" class="ln" marker-end="url(#arr)"/>
<rect x="470" y="22" width="190" height="52" rx="8" class="btl"/>
<text class="ttl" x="565" y="42" text-anchor="middle" dominant-baseline="central">Transformation</text>
<text class="stl" x="565" y="60" text-anchor="middle" dominant-baseline="central">Conversion de formats</text>
<line x1="470" y1="54" x2="442" y2="120" class="ln" marker-end="url(#arr)"/>
<rect x="20" y="112" width="190" height="52" rx="8" class="bpl"/>
<text class="tpl" x="115" y="132" text-anchor="middle" dominant-baseline="central">300+ connecteurs</text>
<text class="spl" x="115" y="150" text-anchor="middle" dominant-baseline="central">JDBC REST Kafka FTP</text>
<line x1="210" y1="138" x2="238" y2="138" class="ln" marker-end="url(#arr)"/>
<rect x="20" y="204" width="190" height="52" rx="8" class="bpl"/>
<text class="tpl" x="115" y="224" text-anchor="middle" dominant-baseline="central">EIP patterns</text>
<text class="spl" x="115" y="242" text-anchor="middle" dominant-baseline="central">Standards integration</text>
<line x1="210" y1="226" x2="238" y2="156" class="ln" marker-end="url(#arr)"/>
<rect x="470" y="112" width="190" height="52" rx="8" class="btl"/>
<text class="ttl" x="565" y="132" text-anchor="middle" dominant-baseline="central">Embarquable</text>
<text class="stl" x="565" y="150" text-anchor="middle" dominant-baseline="central">Docker JVM microservice</text>
<line x1="470" y1="138" x2="442" y2="138" class="ln" marker-end="url(#arr)"/>
<rect x="470" y="204" width="190" height="52" rx="8" class="bgl"/>
<text class="tgl" x="565" y="222" text-anchor="middle" dominant-baseline="central">Hors perimetre</text>
<text class="sgl" x="565" y="240" text-anchor="middle" dominant-baseline="central">BPM Gouvernance Monitoring</text>
</svg>
